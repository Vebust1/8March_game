services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3001
      - PLAYER_BASE_URL=https://auto-n8n-ai.ru
    ports:
      - "3001:3001"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
